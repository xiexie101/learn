<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跟随手指的卡通蜥蜴</title>
    <meta name="description" content="一只可爱的卡通蜥蜴，跟随你的鼠标或手指运动">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        canvas {
            display: block;
        }

        #mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #mode-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        #mode-toggle .icon {
            font-size: 18px;
        }

        #camera-view {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            object-fit: cover;
            display: none;
            z-index: 100;
            transform: scaleX(-1);
        }

        #hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            z-index: 100;
            transition: opacity 0.5s;
        }
    </style>
</head>

<body>
    <button id="mode-toggle" onclick="toggleMode()">
        <span class="icon">🖱️</span>
        <span id="mode-label">鼠标模式</span>
    </button>
    <video id="camera-view" autoplay playsinline></video>
    <div id="hint">移动鼠标，蜥蜴会跟随你 🦎</div>

    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <script>
        // ============================================================
        //  全局状态
        // ============================================================
        let mode = 'mouse'; // 'mouse' | 'camera'
        let targetX, targetY;
        let smoothTargetX, smoothTargetY;
        let handDetected = false;
        let mouseInside = true;
        let idleTimer = 0;
        let handLostFrames = 0;       // 手指丢失计帧器
        let rawHandX = 0, rawHandY = 0; // 原始手指坐标
        let mpHands, videoStream;
        let isProcessingFrame = false; // 防止帧堆积

        // ============================================================
        //  脊柱系统 (变回修长形态)
        // ============================================================
        const SPINE_COUNT = 24;
        const SPINE_SPACING = 12;
        let spine = [];

        // ============================================================
        //  腿部系统 (L型折线腿)
        // ============================================================
        const LEG_CONFIGS = [
            { spineIndex: 5, side: 1, label: 'FL' }, // 左前
            { spineIndex: 5, side: -1, label: 'FR' }, // 右前
            { spineIndex: 16, side: 1, label: 'BL' }, // 左后
            { spineIndex: 16, side: -1, label: 'BR' }, // 右后
        ];

        const STEP_THRESHOLD = 35;
        const STEP_HEIGHT = 12;

        let legs = [];

        // ============================================================
        //  p5.js 生命周期
        // ============================================================
        function setup() {
            // 开启高分屏和硬件加速提示，降低绘图延迟
            pixelDensity(1);
            let canvas = createCanvas(windowWidth, windowHeight);
            canvas.style('will-change', 'transform');
            targetX = width / 2;
            targetY = height / 2;
            smoothTargetX = targetX;
            smoothTargetY = targetY;

            // 初始化脊柱
            for (let i = 0; i < SPINE_COUNT; i++) {
                spine.push({ x: width / 2, y: height / 2 + i * SPINE_SPACING });
            }

            // 初始化腿
            for (let cfg of LEG_CONFIGS) {
                legs.push({
                    ...cfg,
                    footX: spine[cfg.spineIndex].x + cfg.side * 40,
                    footY: spine[cfg.spineIndex].y + 30,
                    targetFootX: 0,
                    targetFootY: 0,
                    stepping: false,
                    stepProgress: 0,
                    oldFootX: 0,
                    oldFootY: 0,
                    newFootX: 0,
                    newFootY: 0,
                });
            }

            // 监听鼠标进出页面
            document.addEventListener('mouseleave', () => {
                mouseInside = false;
            });
            document.addEventListener('mouseenter', () => {
                mouseInside = true;
                idleTimer = 0;
            });
        }

        function draw() {
            // ====== 背景绘制 ======
            if (mode === 'camera') {
                // 摄像头模式：全屏摄像头画面作为背景
                let videoEl = document.getElementById('camera-view');
                if (videoEl && videoEl.readyState >= 2) {
                    push();
                    translate(width, 0);
                    scale(-1, 1); // 镜像
                    drawingContext.drawImage(videoEl, 0, 0, width, height);
                    pop();
                } else {
                    background(26, 26, 46);
                }
            } else {
                background(26, 26, 46);
                drawGround();
            }

            // ====== 目标跟踪逻辑 ======
            if (mode === 'mouse') {
                if (mouseInside) {
                    targetX = mouseX;
                    targetY = mouseY;
                } else {
                    idleTimer++;
                    let restX = width / 2;
                    let restY = height * 0.55;
                    targetX = lerp(targetX, restX, 0.02);
                    targetY = lerp(targetY, restY, 0.02);
                    if (idleTimer > 60) {
                        let wanderPhase = (idleTimer - 60) * 0.015;
                        targetX += sin(wanderPhase) * 30;
                        targetY += cos(wanderPhase * 0.7) * 15;
                    }
                }
            } else if (mode === 'camera') {
                if (!handDetected) {
                    handLostFrames++;
                    if (handLostFrames > 90) {
                        let restX = width / 2;
                        let restY = height * 0.55;
                        targetX = lerp(targetX, restX, 0.02);
                        targetY = lerp(targetY, restY, 0.02);
                        if (handLostFrames > 150) {
                            let wanderPhase = (handLostFrames - 150) * 0.015;
                            targetX += sin(wanderPhase) * 30;
                            targetY += cos(wanderPhase * 0.7) * 15;
                        }
                    }
                } else {
                    handLostFrames = 0;
                }
            }

            // ====== 跟随速度 (彻底移除延迟) ======
            if (mode === 'mouse') {
                let followSpeed = mouseInside ? 0.25 : 0.05;
                smoothTargetX = lerp(smoothTargetX, targetX, followSpeed);
                smoothTargetY = lerp(smoothTargetY, targetY, followSpeed);
            } else {
                // ✨ 摄像头模式：拒绝任何中间件延迟，直接将目标坐标赋给蜥蜴
                smoothTargetX = targetX;
                smoothTargetY = targetY;
            }

            // ====== 更新逻辑 ======
            updateSpine();
            updateLegs();

            // ====== 绘制蜥蜴 (双层绘制法实现贴纸描边) ======

            // 底层描边宽度
            const OUTLINE_W = 6;

            // ================= PASS 1: 白色描边底图 =================
            fill(255);
            stroke(255);
            drawLegs(true);
            drawTail(true);
            drawBody(true);
            drawHead(true);

            // ================= PASS 2: 填充内容 =================
            drawLegs(false);
            drawTail(false);
            drawBody(false);
            drawHead(false);

            // ====== 摄像头模式：手指红点 ======
            if (mode === 'camera' && handDetected) {
                drawFingerDot();
            }

            // ====== 提示 ======
            let hintEl = document.getElementById('hint');
            if (hintEl) {
                if (mode === 'mouse' && !mouseInside && idleTimer > 120) {
                    hintEl.textContent = '回来吧，蜥蜴在等你 🦎';
                    hintEl.style.opacity = '0.6';
                } else if (mode === 'camera' && !handDetected && handLostFrames > 90) {
                    hintEl.textContent = '伸出食指，蜥蜴会跟随你 ☝️';
                    hintEl.style.opacity = '0.6';
                } else if (frameCount > 180) {
                    hintEl.style.opacity = '0';
                }
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        // ============================================================
        //  手指红点
        // ============================================================
        function drawFingerDot() {
            let fx = targetX;
            let fy = targetY;

            // 脉冲发光效果
            let pulse = sin(frameCount * 0.15) * 0.3 + 0.7;
            let glowSize = 20 * pulse;

            // 外层光晕
            noStroke();
            for (let i = 3; i >= 0; i--) {
                let alpha = (3 - i) * 15 + 10;
                fill(255, 60, 60, alpha);
                ellipse(fx, fy, glowSize + i * 8, glowSize + i * 8);
            }

            // 内层实心圆
            fill(255, 70, 70, 230);
            ellipse(fx, fy, 10, 10);

            // 高光点
            fill(255, 180, 180, 200);
            ellipse(fx - 1.5, fy - 1.5, 4, 4);
        }

        // ============================================================
        //  地面
        // ============================================================
        function drawGround() {
            // 微妙的地面纹理线
            stroke(40, 40, 70, 80);
            strokeWeight(1);
            for (let y = 100; y < height; y += 60) {
                let offset = sin(y * 0.01 + frameCount * 0.005) * 20;
                line(0, y + offset, width, y + offset);
            }
        }

        // ============================================================
        //  脊柱更新
        // ============================================================
        function updateSpine() {
            spine[0].x = smoothTargetX;
            spine[0].y = smoothTargetY;

            for (let i = 1; i < SPINE_COUNT; i++) {
                let dx = spine[i].x - spine[i - 1].x;
                let dy = spine[i].y - spine[i - 1].y;
                let dist = sqrt(dx * dx + dy * dy);
                if (dist > 0) {
                    let nx = dx / dist;
                    let ny = dy / dist;
                    spine[i].x = spine[i - 1].x + nx * SPINE_SPACING;
                    spine[i].y = spine[i - 1].y + ny * SPINE_SPACING;
                }
            }
        }

        // ============================================================
        //  身体绘制 (一坨圆润的软糖)
        // ============================================================
        const MINT_GREEN = [120, 225, 175];
        const DARK_MINT = [95, 200, 150];

        function drawBody() {
            noStroke();

            // 身体宽度沿脊柱变化：头部肥大圆润 → 尾部快速收紧 (水滴状)
            let widths = [];
            for (let i = 0; i < SPINE_COUNT; i++) {
                let t = i / (SPINE_COUNT - 1);
                let w;
                if (t < 0.3) {
                    w = lerp(26, 30, t / 0.3); // 肥大的前半身
                } else {
                    w = lerp(30, 4, (t - 0.3) / 0.7); // 向后收拢
                }
                widths.push(w);
            }

            // 用密集的椭圆拼接出极致圆润的无缝软糖感
            fill(MINT_GREEN);
            let steps = 2; // 用更少的步数也能做到平滑，因为脊柱变短了
            for (let i = 0; i < SPINE_COUNT - 1; i++) {
                for (let s = 0; s <= steps; s++) {
                    let frac = s / steps;
                    let px = lerp(spine[i].x, spine[i + 1].x, frac);
                    let py = lerp(spine[i].y, spine[i + 1].y, frac);
                    let pw = lerp(widths[i], widths[i + 1], frac) * 2;
                    ellipse(px, py, pw, pw);
                }
            }
        }

        // ============================================================
        //  头部绘制 (呆萌五官)
        // ============================================================
        function drawHead() {
            let hx = spine[0].x;
            let hy = spine[0].y;
            let angle = atan2(spine[0].y - spine[1].y, spine[0].x - spine[1].x);

            push();
            translate(hx, hy);
            rotate(angle);

            // 主头部 (大且圆钝)
            noStroke();
            fill(MINT_GREEN);
            ellipse(6, 0, 56, 52);

            // 极简豆豆眼
            let eyeOffsetX = 12;
            let eyeOffsetY = 16;

            // 瞳孔随运动微调 (增加灵动)
            let lookDist = dist(hx, hy, targetX, targetY);
            let lookOffset = constrain(lookDist * 0.02, 0, 4);

            fill(30); // 纯黑极简眼
            ellipse(eyeOffsetX + lookOffset, -eyeOffsetY, 8, 8);
            ellipse(eyeOffsetX + lookOffset, eyeOffsetY, 8, 8);

            // 可爱腮红
            fill(255, 120, 150, 150);
            ellipse(eyeOffsetX - 2, -eyeOffsetY - 8, 12, 8);
            ellipse(eyeOffsetX - 2, eyeOffsetY + 8, 12, 8);

            // 极简嘴巴 (小写 v)
            stroke(DARK_MINT);
            strokeWeight(3);
            strokeCap(ROUND);
            strokeJoin(ROUND);
            noFill();
            beginShape();
            vertex(26, -4);
            vertex(30, 0);
            vertex(26, 4);
            endShape();

            pop();
        }

        // ============================================================
        //  尾巴绘制 (软糯小短尾)
        // ============================================================
        function drawTail() {
            let last = spine[SPINE_COUNT - 1];
            let prev = spine[SPINE_COUNT - 2];
            let angle = atan2(last.y - prev.y, last.x - prev.x);

            // 尾巴末端轻微摆动
            let waggle = sin(frameCount * 0.1) * 10;

            push();
            translate(last.x, last.y);
            rotate(angle);

            stroke(MINT_GREEN);
            strokeWeight(10);
            strokeCap(ROUND);
            noFill();

            beginShape();
            vertex(0, 0);
            quadraticVertex(10, waggle, 20, waggle * 1.5);
            endShape();

            pop();
        }

        // ============================================================
        //  带折角的贴纸风格腿部
        // ============================================================
        function updateLegs() {
            const MAX_REACH = 60;

            for (let i = 0; i < legs.length; i++) {
                let leg = legs[i];
                let anchor = spine[leg.spineIndex];
                let prevSpine = spine[leg.spineIndex - 1] || spine[leg.spineIndex];
                let bodyAngle = atan2(
                    anchor.y - prevSpine.y,
                    anchor.x - prevSpine.x
                );

                // 肩膀/大腿根部位置
                let shoulderX = anchor.x + (-sin(bodyAngle)) * leg.side * 18;
                let shoulderY = anchor.y + cos(bodyAngle) * leg.side * 18;

                // 理想落脚点 (向外+向前/向后)
                // 前腿往前指，后腿往后指
                let fwdDir = (i < 2) ? 1 : -1;
                let idealFootX = anchor.x + (-sin(bodyAngle)) * leg.side * 36 + cos(bodyAngle) * 22 * fwdDir;
                let idealFootY = anchor.y + cos(bodyAngle) * leg.side * 36 + sin(bodyAngle) * 22 * fwdDir;

                let footDist = dist(leg.footX, leg.footY, idealFootX, idealFootY);
                let footToShoulder = dist(leg.footX, leg.footY, shoulderX, shoulderY);

                if (footToShoulder > MAX_REACH * 1.5) {
                    leg.footX = idealFootX;
                    leg.footY = idealFootY;
                    leg.stepping = false;
                }

                let partner = (i + 2) % 4;
                let canStep = !legs[partner].stepping;

                if (footDist > STEP_THRESHOLD && !leg.stepping && canStep) {
                    leg.stepping = true;
                    leg.stepProgress = 0;
                    leg.oldFootX = leg.footX;
                    leg.oldFootY = leg.footY;
                    leg.newFootX = idealFootX;
                    leg.newFootY = idealFootY;
                }

                if (footDist > STEP_THRESHOLD * 2 && !leg.stepping) {
                    leg.stepping = true;
                    leg.stepProgress = 0;
                    leg.oldFootX = leg.footX;
                    leg.oldFootY = leg.footY;
                    leg.newFootX = idealFootX;
                    leg.newFootY = idealFootY;
                }

                if (leg.stepping) {
                    let stepSpeed = map(footDist, STEP_THRESHOLD, STEP_THRESHOLD * 3, 0.15, 0.4, true);
                    leg.stepProgress += stepSpeed;
                    if (leg.stepProgress >= 1) {
                        leg.stepProgress = 1;
                        leg.stepping = false;
                    }

                    let t = leg.stepProgress;
                    let ease = t < 0.5 ? 2 * t * t : 1 - pow(-2 * t + 2, 2) / 2;
                    leg.footX = lerp(leg.oldFootX, leg.newFootX, ease);
                    leg.footY = lerp(leg.oldFootY, leg.newFootY, ease);

                    // 抬脚
                    let lift = sin(t * PI) * STEP_HEIGHT;
                    leg.footX += (-sin(bodyAngle)) * leg.side * lift;
                    leg.footY += cos(bodyAngle) * leg.side * lift;
                }
            }
        }

        function drawLegs(isOutline) {
            for (let i = 0; i < legs.length; i++) {
                let leg = legs[i];
                let anchor = spine[leg.spineIndex];
                let prevSpine = spine[leg.spineIndex - 1] || spine[leg.spineIndex];
                let bodyAngle = atan2(
                    anchor.y - prevSpine.y,
                    anchor.x - prevSpine.x
                );

                // 肩膀/大腿根部位置
                let shoulderX = anchor.x + (-sin(bodyAngle)) * leg.side * 12;
                let shoulderY = anchor.y + cos(bodyAngle) * leg.side * 12;

                // L型折线手：计算手肘坐标 (只向外扩张)
                let elbowX = anchor.x + (-sin(bodyAngle)) * leg.side * 32;
                let elbowY = anchor.y + cos(bodyAngle) * leg.side * 32;

                if (isOutline) {
                    stroke(255);
                    strokeWeight(16 + 6);
                } else {
                    stroke(MINT_GREEN);
                    strokeWeight(16);
                }
                strokeCap(ROUND);
                strokeJoin(ROUND); // 圆润折角
                noFill();

                beginShape();
                vertex(shoulderX, shoulderY);
                vertex(elbowX, elbowY);  // 拐角
                vertex(leg.footX, leg.footY); // 脚尖
                endShape();
            }
        }

        // ============================================================
        //  模式切换
        // ============================================================
        function toggleMode() {
            if (mode === 'mouse') {
                mode = 'camera';
                document.getElementById('mode-label').textContent = '摄像头模式';
                document.querySelector('#mode-toggle .icon').textContent = '📷';
                document.getElementById('hint').textContent = '伸出食指，蜥蜴会跟随你的手指 ☝️';
                document.getElementById('hint').style.opacity = '1';
                startCamera();
            } else {
                mode = 'mouse';
                document.getElementById('mode-label').textContent = '鼠标模式';
                document.querySelector('#mode-toggle .icon').textContent = '🖱️';
                document.getElementById('hint').textContent = '移动鼠标，蜥蜴会跟随你 🦎';
                document.getElementById('hint').style.opacity = '1';
                stopCamera();
            }
        }

        // ============================================================
        //  MediaPipe Hands
        // ============================================================
        function startCamera() {
            const videoEl = document.getElementById('camera-view');
            // 摄像头模式下 video 元素不单独显示（已绘制到画布上）
            videoEl.style.display = 'block';
            videoEl.style.opacity = '0';
            videoEl.style.pointerEvents = 'none';
            videoEl.style.position = 'fixed';
            videoEl.style.top = '0';
            videoEl.style.left = '0';
            videoEl.style.width = '1px';
            videoEl.style.height = '1px';

            if (!mpHands) {
                mpHands = new Hands({
                    locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                    }
                });

                mpHands.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 1,  // 恢复为稳定版 1
                    minDetectionConfidence: 0.6,
                    minTrackingConfidence: 0.4,
                });

                mpHands.onResults(onHandResults);
            }

            // ✨ 使用 requestVideoFrameCallback 将视频帧处理与 UI 渲染解耦
            if (!videoStream) {
                navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, frameRate: { ideal: 60 } }
                }).then((stream) => {
                    videoStream = stream;
                    videoEl.srcObject = stream;
                    videoEl.play();

                    let processFrame = async () => {
                        if (mode !== 'camera' || videoEl.paused || videoEl.ended) return;

                        // 跳过积压的帧
                        if (!isProcessingFrame && videoEl.readyState >= 2) {
                            isProcessingFrame = true;
                            await mpHands.send({ image: videoEl });
                            isProcessingFrame = false;
                        }

                        // 请求下一帧
                        if ('requestVideoFrameCallback' in videoEl) {
                            videoEl.requestVideoFrameCallback(processFrame);
                        } else {
                            // 降级方案 (Firefox)
                            requestAnimationFrame(processFrame);
                        }
                    };

                    if ('requestVideoFrameCallback' in videoEl) {
                        videoEl.requestVideoFrameCallback(processFrame);
                    } else {
                        requestAnimationFrame(processFrame);
                    }
                }).catch(err => {
                    console.error("无法访问摄像头: ", err);
                    document.getElementById('hint').textContent = '⚠️ 无法访问摄像头';
                });
            } else {
                videoEl.play();
            }
        }

        function stopCamera() {
            const videoEl = document.getElementById('camera-view');
            videoEl.style.display = 'none';
            videoEl.style.opacity = '';
            videoEl.style.pointerEvents = '';
            videoEl.style.position = '';
            videoEl.style.width = '';
            videoEl.style.height = '';

            videoEl.pause();
            handDetected = false;
            isProcessingFrame = false;
        }

        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                handDetected = true;
                // 食指指尖 = landmark 8
                let tip = results.multiHandLandmarks[0][8];
                // 实时映射到画布坐标，不做任何滤波延迟
                targetX = (1 - tip.x) * width;
                targetY = tip.y * height;
            } else {
                handDetected = false;
            }
        }

        // 触摸支持 (bonus)
        function touchMoved(event) {
            if (mode === 'mouse') {
                targetX = mouseX;
                targetY = mouseY;
            }
            return false; // 阻止默认滚动
        }
    </script>
</body>

</html>
